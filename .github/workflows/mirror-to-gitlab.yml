name: Mirror to GitLab

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push mirror to GitLab
        # GITLAB_REPO_URL must be a full HTTPS URL,
        # e.g. https://gitlab.com/<username>/<repo>.git
        # GITLAB_TOKEN must be a GitLab Personal Access Token with write_repository scope.
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          if [[ "$GITLAB_REPO_URL" != https://* ]]; then
            echo "Error: GITLAB_REPO_URL must start with 'https://'" >&2
            exit 1
          fi
          REPO_HOST_PATH="${GITLAB_REPO_URL#https://}"
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${REPO_HOST_PATH}"
          # --mirror keeps branches, tags, and deletions in sync for a true mirror.
          git push --mirror gitlab
