name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily reconciliation at 06:00 UTC — prunes orphans

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push mirror to GitLab
        # GITLAB_REPO_URL must be a full HTTPS URL,
        # e.g. https://gitlab.com/<username>/<repo>.git
        # GITLAB_TOKEN must be a GitLab Personal Access Token with write_repository scope.
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.event.ref_type }}
          REF_NAME: ${{ github.event.ref }}
        run: |
          set -euo pipefail

          if [[ "$GITLAB_REPO_URL" != https://* ]]; then
            echo "Error: GITLAB_REPO_URL must start with 'https://'" >&2
            exit 1
          fi
          REPO_HOST_PATH="${GITLAB_REPO_URL#https://}"

          # Idempotent remote setup
          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${REPO_HOST_PATH}"

          case "$EVENT_NAME" in
            delete)
              # Targeted delete. Check existence first so "already gone" isn't fatal,
              # but real failures (auth, protected branch) still abort the workflow.
              case "$REF_TYPE" in
                branch) FULL_REF="refs/heads/${REF_NAME}" ;;
                tag)    FULL_REF="refs/tags/${REF_NAME}" ;;
                *)      echo "Unknown ref_type: ${REF_TYPE}" >&2; exit 1 ;;
              esac
              if git ls-remote --exit-code gitlab "$FULL_REF" >/dev/null 2>&1; then
                echo "Deleting ${REF_TYPE} '${REF_NAME}' on GitLab"
                git push gitlab --delete "$FULL_REF"
              else
                echo "${REF_TYPE^} '${REF_NAME}' already absent on GitLab — nothing to do"
              fi
              ;;

            schedule|workflow_dispatch)
              # Reconciliation pass — make GitLab match GitHub exactly, including
              # pruning refs that no longer exist on GitHub. This catches missed
              # delete events. GITLAB_REPO_URL had better be correct.
              echo "Reconciliation: syncing all refs and pruning orphans"
              git push gitlab 'refs/remotes/origin/*:refs/heads/*' --force --prune
              git push gitlab '+refs/tags/*:refs/tags/*' --prune
              ;;

            push)
              # Normal sync: force-push everything, no pruning. GitHub is authoritative.
              git push gitlab 'refs/remotes/origin/*:refs/heads/*' --force
              git push gitlab --tags --force
              ;;

            *)
              echo "Unhandled event: ${EVENT_NAME}" >&2
              exit 1
              ;;
          esac
