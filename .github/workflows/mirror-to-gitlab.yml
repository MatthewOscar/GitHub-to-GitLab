# Mirrors GitHub → GitLab. Pushes are non-forced and deletions are explicit
# rather than --prune, so divergence and missed events fail loudly instead
# of silently overwriting work on GitLab.

name: Mirror to GitLab

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push mirror to GitLab
        # GITLAB_REPO_URL must be a full HTTPS URL,
        # e.g. https://gitlab.com/<username>/<repo>.git
        # GITLAB_TOKEN must be a GitLab Personal Access Token with write_repository scope.
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.event.ref_type }}
          REF_NAME: ${{ github.event.ref }}
        run: |
          if [[ "$GITLAB_REPO_URL" != https://* ]]; then
            echo "Error: GITLAB_REPO_URL must start with 'https://'" >&2
            exit 1
          fi
          REPO_HOST_PATH="${GITLAB_REPO_URL#https://}"
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${REPO_HOST_PATH}"
          # Handle mirroring using specific commands per ref type.
          if [[ "$EVENT_NAME" == "delete" ]]; then
            if [[ "$REF_TYPE" == "branch" ]]; then
              echo "Deleting branch '${REF_NAME}' on GitLab"
              git push gitlab --delete "refs/heads/${REF_NAME}"
            elif [[ "$REF_TYPE" == "tag" ]]; then
              echo "Deleting tag '${REF_NAME}' on GitLab"
              git push gitlab --delete "refs/tags/${REF_NAME}"
            fi
          else
            git push gitlab 'refs/remotes/origin/*:refs/heads/*'
            git push gitlab --tags
          fi
